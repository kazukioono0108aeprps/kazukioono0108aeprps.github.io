<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>★ ROLE ROULETTE ★</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cyan:    #00ffff;
  --magenta: #ff00ff;
  --yellow:  #ffff00;
  --green:   #00ff66;
  --orange:  #ff8800;
  --red:     #ff2244;
  --bg:      #000011;
}

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Press Start 2P', 'ＭＳ ゴシック', monospace;
  min-height: 100vh;
  padding: 16px;
  background-image:
    radial-gradient(ellipse at 50% 0%, #0a0044 0%, transparent 60%),
    radial-gradient(ellipse at 0% 100%, #001a22 0%, transparent 50%);
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* Flash overlay */
#flashOverlay {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 9998;
}

/* ===== TITLE ===== */
.game-title {
  text-align: center;
  font-size: clamp(16px, 4vw, 30px);
  color: var(--yellow);
  text-shadow: 3px 3px #cc6600, 6px 6px #660000;
  letter-spacing: 4px;
  padding: 16px 0 4px;
  animation: titleFlicker 4s step-end infinite;
}
@keyframes titleFlicker {
  0%,93%,100% { opacity: 1; }
  94%          { opacity: 0.3; }
  95%          { opacity: 1; }
  97%          { opacity: 0.1; }
  98%          { opacity: 1; }
}

.subtitle {
  text-align: center;
  font-size: 8px;
  color: var(--cyan);
  letter-spacing: 3px;
  margin-bottom: 20px;
  animation: blink 1.2s step-end infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0; }
}

/* ===== INPUT AREA ===== */
.input-section {
  display: flex;
  gap: 14px;
  max-width: 760px;
  margin: 0 auto 10px;
}

.input-panel {
  flex: 1;
  border: 3px solid var(--cyan);
  box-shadow: 0 0 12px rgba(0,255,255,0.4), inset 0 0 12px rgba(0,255,255,0.04);
}
.input-panel.roles-panel {
  border-color: var(--magenta);
  box-shadow: 0 0 12px rgba(255,0,255,0.4), inset 0 0 12px rgba(255,0,255,0.04);
}

.panel-title {
  background: var(--cyan);
  color: #000;
  font-size: 8px;
  padding: 7px 10px;
  letter-spacing: 2px;
  text-align: center;
}
.roles-panel .panel-title { background: var(--magenta); }

.panel-hint {
  font-size: 7px;
  color: #555;
  text-align: center;
  padding: 4px 8px 2px;
  letter-spacing: 1px;
}

.big-textarea {
  display: block;
  width: 100%;
  min-height: 160px;
  background: #000;
  border: none;
  border-top: 2px solid #1a1a2a;
  color: #eee;
  font-family: 'ＭＳ ゴシック', 'MS Gothic', monospace;
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  resize: vertical;
  line-height: 1.8;
}
.big-textarea:focus {
  border-top-color: var(--cyan);
  box-shadow: inset 0 0 8px rgba(0,255,255,0.08);
}
.roles-panel .big-textarea:focus {
  border-top-color: var(--magenta);
  box-shadow: inset 0 0 8px rgba(255,0,255,0.08);
}

/* ===== COUNT BAR ===== */
.count-bar {
  display: flex;
  justify-content: center;
  gap: 40px;
  font-size: 8px;
  margin: 8px auto;
  max-width: 760px;
}
.count-item { color: #666; }
.count-item span { font-size: 13px; }
#playerCount { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
#roleCount   { color: var(--magenta); text-shadow: 0 0 8px var(--magenta); }

.diff-note {
  text-align: center;
  font-size: 7px;
  color: var(--orange);
  min-height: 14px;
  margin: 2px 0;
  letter-spacing: 1px;
}

/* ===== DUPLICATE TOGGLE ===== */
.dup-toggle {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  max-width: 760px;
  margin: 6px auto 2px;
}
.dup-toggle label {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 5px 14px;
  border: 2px solid #2a2a3a;
  color: #555;
  transition: all 0.1s;
  user-select: none;
}
.dup-toggle input[type="radio"] { display: none; }
.dup-toggle input[type="radio"]:checked + label {
  border-color: var(--yellow);
  color: var(--yellow);
  text-shadow: 0 0 6px var(--yellow);
  background: #1a1400;
}
.dup-toggle-sep {
  color: #333;
  font-size: 9px;
}

/* ===== ERROR ===== */
.error-msg {
  text-align: center;
  color: var(--red);
  font-size: 8px;
  min-height: 14px;
  letter-spacing: 1px;
  margin: 4px 0;
}

/* ===== SHUFFLE BUTTON ===== */
.shuffle-wrap { text-align: center; margin: 14px 0 20px; }

.shuffle-btn {
  background: linear-gradient(180deg, #ffee00 0%, #ff8800 50%, #cc4400 100%);
  border-top:    5px solid #ffff88;
  border-left:   5px solid #ffff88;
  border-bottom: 5px solid #883300;
  border-right:  5px solid #883300;
  color: #000;
  font-family: inherit;
  font-size: clamp(12px, 3vw, 20px);
  letter-spacing: 4px;
  padding: 14px 36px;
  cursor: pointer;
  text-shadow: 1px 1px rgba(255,255,255,0.6);
  box-shadow: 0 0 24px rgba(255,140,0,0.7), 0 0 50px rgba(255,80,0,0.3);
  animation: btnPulse 1.8s ease-in-out infinite;
  transition: transform 0.08s;
}
.shuffle-btn:hover { filter: brightness(1.15); }
.shuffle-btn:active {
  border-top-width:    2px;
  border-left-width:   2px;
  border-bottom-width: 8px;
  border-right-width:  8px;
  transform: translate(2px, 2px);
}
.shuffle-btn:disabled {
  filter: grayscale(0.8) brightness(0.6);
  cursor: not-allowed;
  animation: none;
  box-shadow: none;
}
@keyframes btnPulse {
  0%,100% { box-shadow: 0 0 24px rgba(255,140,0,0.7), 0 0 50px rgba(255,80,0,0.3); }
  50%      { box-shadow: 0 0 36px rgba(255,200,0,0.9), 0 0 70px rgba(255,140,0,0.5); }
}

/* ===== RESULTS ===== */
.results-section {
  max-width: 760px;
  margin: 0 auto;
}
.results-title {
  text-align: center;
  font-size: 13px;
  color: var(--green);
  letter-spacing: 4px;
  margin-bottom: 16px;
  text-shadow: 0 0 10px var(--green), 0 0 20px var(--green);
  display: none;
}

.results-grid {
  display: flex;
  flex-direction: column;
  gap: 0;
  width: fit-content;
  min-width: 280px;
  margin: 0 auto;
  border: 2px solid #222;
}

.result-card {
  display: flex;
  align-items: center;
  background: #03030f;
  border-bottom: 1px solid #1a1a2a;
  padding: 10px 20px;
  opacity: 0;
  transform: translateX(-10px);
  transition: opacity 0.2s, transform 0.2s;
}
.result-card:last-child { border-bottom: none; }
.result-card.visible {
  opacity: 1;
  transform: translateX(0);
}
.result-card.locked {
  border-left: 3px solid var(--cyan);
}

.card-name {
  font-size: 11px;
  color: #aaa;
  width: 120px;
  letter-spacing: 1px;
  text-align: right;
}
.card-arrow {
  font-size: 11px;
  color: var(--yellow);
  margin: 0 14px;
  animation: arrowBlink 0.4s step-end infinite;
  flex-shrink: 0;
}
@keyframes arrowBlink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0; }
}
.card-arrow.still { animation: none; }

.role-display {
  font-size: 11px;
  color: var(--magenta);
  text-shadow: 0 0 8px var(--magenta);
  letter-spacing: 1px;
  width: 120px;
}
.role-display.locked-role {
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan), 0 0 20px rgba(0,255,255,0.3);
  animation: roleReveal 0.3s ease-out;
}
@keyframes roleReveal {
  0%   { opacity: 0; letter-spacing: 4px; }
  100% { opacity: 1; letter-spacing: 1px; }
}

/* ===== PRESET BUTTONS ===== */
.preset-area {
  padding: 6px 8px 8px;
  background: #05000f;
  border-top: 1px solid #1a1a2a;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
}
.preset-label {
  font-size: 7px;
  color: #444;
  letter-spacing: 1px;
  width: 100%;
}
.preset-btn {
  background: #0d0020;
  border: 2px solid #3a1a5a;
  color: #bb88ff;
  font-family: inherit;
  font-size: 8px;
  padding: 4px 10px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.1s;
}
.preset-btn:hover {
  background: #1a0040;
  border-color: #aa55ff;
  color: #ddaaff;
  box-shadow: 0 0 6px rgba(170,85,255,0.5);
}
.preset-btn:active {
  background: #2a0060;
}

/* ===== RESET BTN ===== */
.reset-wrap { text-align: center; margin: 20px 0 10px; display: none; }
.reset-btn {
  background: #110011;
  border: 2px solid #440044;
  color: var(--magenta);
  font-family: inherit;
  font-size: 9px;
  padding: 8px 20px;
  cursor: pointer;
  letter-spacing: 2px;
}
.reset-btn:hover { background: #220022; border-color: var(--magenta); }

/* ===== RAINBOW DIVIDER ===== */
.rainbow-line {
  height: 4px;
  background: linear-gradient(90deg, #ff0000,#ff8800,#ffff00,#00ff00,#00ffff,#0088ff,#ff00ff,#ff0000);
  max-width: 760px;
  margin: 14px auto;
}
</style>
</head>
<body>

<div id="flashOverlay"></div>

<!-- TITLE -->
<div class="game-title">★ ROLE ROULETTE ★</div>
<div class="subtitle">▼ ENTER YOUR PLAYERS & ROLES ▼</div>
<div class="rainbow-line"></div>

<!-- INPUT PANELS -->
<div class="input-section">

  <!-- PLAYERS -->
  <div class="input-panel">
    <div class="panel-title">👤 PLAYERS　参加者</div>
    <div class="panel-hint">1行につき1人</div>
    <textarea class="big-textarea" id="playersTextarea"
      placeholder="Aさん&#10;Bさん&#10;Cさん&#10;Dさん"
      oninput="updateCountBar()">Aさん
Bさん
Cさん
Dさん</textarea>
  </div>

  <!-- ROLES -->
  <div class="input-panel roles-panel">
    <div class="panel-title">🎭 ROLES　役割</div>
    <div class="panel-hint">1行につき1つ</div>
    <textarea class="big-textarea" id="rolesTextarea"
      placeholder="桃太郎&#10;キジ&#10;イヌ&#10;サル"
      oninput="updateCountBar()">桃太郎
キジ
イヌ
サル</textarea>
    <div class="preset-area">
      <div class="preset-label">PRESET ▶</div>
      <button class="preset-btn" onclick="applyPreset('slay2')">スレスパ２</button>
    </div>
  </div>

</div>

<!-- DUPLICATE TOGGLE -->
<div class="dup-toggle">
  <input type="radio" name="dupMode" id="dupOn"  value="on"  checked>
  <label for="dupOn">かぶりあり</label>
  <span class="dup-toggle-sep">/</span>
  <input type="radio" name="dupMode" id="dupOff" value="off">
  <label for="dupOff">かぶりなし</label>
</div>

<!-- COUNT / DIFF NOTE -->
<div class="count-bar">
  <div class="count-item">PLAYERS ▶ <span id="playerCount">0</span></div>
  <div class="count-item">ROLES ▶ <span id="roleCount">0</span></div>
</div>
<div class="diff-note" id="diffNote"></div>

<!-- ERROR -->
<div class="error-msg" id="errorMsg"></div>

<!-- SHUFFLE BUTTON -->
<div class="shuffle-wrap">
  <button class="shuffle-btn" id="shuffleBtn" onclick="doShuffle()">
    ▶▶ SHUFFLE !! ◀◀
  </button>
</div>

<div class="rainbow-line"></div>

<!-- RESULTS -->
<div class="results-section">
  <div class="results-title" id="resultsTitle">★★ RESULT !! ★★</div>
  <div class="results-grid" id="resultsGrid"></div>
  <div class="reset-wrap" id="resetWrap">
    <button class="reset-btn" onclick="resetResults()">▶ RETRY</button>
  </div>
</div>


<script>
let isShuffling = false;

// ==============================
//  プリセット定義
// ==============================
const PRESETS = {
  slay2: `アイアンクラッド\nサイレント\nリージェント\nネクロバインダー\nディフェクト`,
};

function applyPreset(key) {
  const val = PRESETS[key];
  if (!val) return;
  document.getElementById('rolesTextarea').value = val;
  updateCountBar();
}

// ==============================
//  テキストエリアからリストを取得
// ==============================
function getPlayers() {
  return document.getElementById('playersTextarea').value
    .split('\n').map(v => v.trim()).filter(Boolean);
}
function getRoles() {
  return document.getElementById('rolesTextarea').value
    .split('\n').map(v => v.trim()).filter(Boolean);
}

// ==============================
//  カウントバー更新
// ==============================
function getDupMode() {
  return document.querySelector('input[name="dupMode"]:checked').value;
}

function updateCountBar() {
  const pc  = getPlayers().length;
  const rc  = getRoles().length;
  const dup = getDupMode();
  document.getElementById('playerCount').textContent = pc;
  document.getElementById('roleCount').textContent   = rc;

  const note = document.getElementById('diffNote');
  if (pc === 0 || rc === 0) { note.textContent = ''; return; }
  if (dup === 'on') {
    note.textContent = '▶ かぶりあり：全員がロールリストから完全ランダム抽選（同じ役が複数人に当たる可能性あり）';
  } else if (pc === rc) {
    note.textContent = '▶ かぶりなし：全員に異なる役割を1つずつ割り当て';
  } else if (pc > rc) {
    note.textContent = `▶ かぶりなし：PLAYERS が ${pc-rc} 人多い → ${pc-rc} 人は「－」になります`;
  } else {
    note.textContent = `▶ かぶりなし：ROLES が ${rc-pc} つ多い → 余った役割は未使用になります`;
  }
}

// ラジオ変更時もカウントバー更新
document.addEventListener('change', e => {
  if (e.target.name === 'dupMode') updateCountBar();
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==============================
//  シャッフルロジック
// ==============================
function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function assignRoles(players, roles) {
  const dup = getDupMode();
  const result = [];

  if (dup === 'on') {
    // かぶりあり：全員がロールリストからランダム抽選（完全独立・重複あり）
    players.forEach(p => {
      result.push({ name: p, role: roles[Math.floor(Math.random() * roles.length)] });
    });
  } else {
    // かぶりなし：シャッフルして1対1で割り当て、余ったプレイヤーは「－」
    const shuffledRoles   = shuffleArr(roles);
    const shuffledPlayers = shuffleArr(players);
    shuffledPlayers.forEach((p, i) => {
      result.push({ name: p, role: i < shuffledRoles.length ? shuffledRoles[i] : '－' });
    });
    result.sort((a, b) => players.indexOf(a.name) - players.indexOf(b.name));
  }

  return result;
}

// ==============================
//  メインシャッフル
// ==============================
function doShuffle() {
  if (isShuffling) return;

  const players = getPlayers();
  const roles   = getRoles();
  const errEl   = document.getElementById('errorMsg');

  if (players.length === 0) { errEl.textContent = '⚠ PLAYERを入力してください'; return; }
  if (roles.length === 0)   { errEl.textContent = '⚠ ROLEを入力してください';   return; }
  errEl.textContent = '';

  isShuffling = true;
  document.getElementById('shuffleBtn').disabled = true;
  document.getElementById('resetWrap').style.display = 'none';
  document.getElementById('resultsTitle').style.display = 'none';

  const finalResults = assignRoles(players, roles);
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';

  finalResults.forEach(r => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="card-name">${esc(r.name)}</div>
      <span class="card-arrow">▼</span>
      <div class="role-display" data-final="${esc(r.role)}">???</div>
    `;
    grid.appendChild(card);
  });

  const cards = grid.querySelectorAll('.result-card');
  cards.forEach((card, i) => {
    setTimeout(() => card.classList.add('visible'), i * 60 + 50);
  });

  const roleDisplays = grid.querySelectorAll('.role-display');
  const shuffleInterval = setInterval(() => {
    roleDisplays.forEach(el => {
      el.textContent = roles[Math.floor(Math.random() * roles.length)];
    });
  }, 70);

  setTimeout(() => {
    clearInterval(shuffleInterval);

    const flash = document.getElementById('flashOverlay');
    flash.style.transition = 'none';
    flash.style.opacity    = '1';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      flash.style.transition = 'opacity 0.5s ease-out';
      flash.style.opacity    = '0';
    }));

    roleDisplays.forEach(el => {
      el.textContent = el.dataset.final;
      el.classList.add('locked-role');
    });
    cards.forEach(card => card.classList.add('locked'));
    grid.querySelectorAll('.card-arrow').forEach(a => a.classList.add('still'));

    setTimeout(() => {
      document.getElementById('resultsTitle').style.display = 'block';
      document.getElementById('resetWrap').style.display    = 'block';
      isShuffling = false;
      document.getElementById('shuffleBtn').disabled = false;
    }, 400);

  }, 1800);
}

// ==============================
//  RESET
// ==============================
function resetResults() {
  document.getElementById('resultsGrid').innerHTML = '';
  document.getElementById('resultsTitle').style.display = 'none';
  document.getElementById('resetWrap').style.display    = 'none';
}

// ==============================
//  INIT
// ==============================
updateCountBar();
</script>
</body>
</html>
